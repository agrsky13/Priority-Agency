<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="format-detection" content="telephone=yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>PRIORITY AGENCY - Профессиональные детективные услуги</title>
    <meta name="description" content="Лицензированное детективное агентство. Профессиональные расследования и сбор информации с многолетним опытом." />
    <meta name="keywords" content="детектив, частный детектив, детективные услуги, расследование, поиск людей, сбор информации" />
  </head>
  <body>
    <!-- Сброс SW/кэша до React: старый SW отдавал устаревший index.html с несуществующими /assets/*.js -->
    <script>
      (function () {
        try {
          if (typeof navigator !== "undefined" && "serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { r.unregister(); });
            });
          }
          /* Полная очистка Cache Storage: любой старый SW кэш ломал загрузку чанков после деплоя */
          if (typeof caches !== "undefined") {
            caches.keys().then(function (keys) {
              keys.forEach(function (key) { caches.delete(key); });
            });
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
