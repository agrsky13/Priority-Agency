<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контактная форма - Priority Agency</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo p {
            color: #aaa;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #007bff;
            background: rgba(255, 255, 255, 0.15);
        }
        
        input::placeholder, textarea::placeholder {
            color: #aaa;
        }
        
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
            margin-top: 3px;
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            font-size: 14px;
            line-height: 1.4;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3);
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .success {
            background: #28a745;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .error {
            background: #dc3545;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .contact-info {
            margin-top: 30px;
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }
        
        .contact-info a {
            color: #007bff;
            text-decoration: none;
        }
        
        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>PRIORITY AGENCY</h1>
            <p>Детективные услуги</p>
        </div>
        
        <div id="success" class="success">
            ✅ Заявка отправлена! Мы свяжемся с вами в ближайшее время.
        </div>
        
        <div id="error" class="error">
            ❌ Ошибка отправки. Попробуйте позже или позвоните нам.
        </div>
        
        <form action="https://formspree.io/f/xjkeplve" method="POST" id="contactForm">
            <div class="form-group">
                <label for="name">Ваше имя *</label>
                <input type="text" id="name" name="name" placeholder="Введите ваше имя" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Телефон *</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (999) 999-99-99" required>
            </div>
            
            <div class="form-group">
                <label for="message">Сообщение</label>
                <textarea id="message" name="message" placeholder="Опишите вашу ситуацию" rows="4"></textarea>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="consent" name="consent" required>
                <label for="consent">
                    Я даю согласие на обработку моих персональных данных в соответствии с политикой конфиденциальности *
                </label>
            </div>
            
            <input type="hidden" name="_subject" value="Новая заявка с сайта Priority Agency">
            <input type="hidden" name="_replyto" value="priorityagency@proton.me">
            <input type="hidden" name="_next" value="?success=1">
            <input type="hidden" name="_cc" value="priorityagency@proton.me">
            
            <button type="submit" id="submitBtn">
                Отправить заявку
            </button>
        </form>
        
        <div class="contact-info">
            <p>Или свяжитесь с нами напрямую:</p>
            <p>
                📞 <a href="tel:+79998981439">+7 999 898 14 39</a> | 
                ✈️ <a href="https://t.me/priorityagencyru">@priorityagencyru</a>
            </p>
        </div>
    </div>
    
    <script>
        // Show success message if redirected from Formspree
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success') === '1') {
            document.getElementById('success').style.display = 'block';
            document.getElementById('contactForm').style.display = 'none';
        }
        
        // Handle form submission
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправляем...';
            
            // Reset button after 5 seconds if no redirect
            setTimeout(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Отправить заявку';
            }, 5000);
        });
        
        // Phone number formatting
        document.getElementById('phone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.startsWith('8')) {
                value = '7' + value.slice(1);
            }
            if (value.startsWith('7') && value.length > 1) {
                value = '+7 (' + value.slice(1, 4) + ') ' + value.slice(4, 7) + '-' + value.slice(7, 9) + '-' + value.slice(9, 11);
            }
            e.target.value = value;
        });
    </script>
</body>
</html>
